<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幼教专业成长实战 - 南方公园风格</title>
    <script src="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body { 
            background: #fdf2f8; 
            font-family: 'ZCOOL KuaiLe', 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .comic-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border: 4px solid #000;
            border-radius: 20px;
            box-shadow: 12px 12px 0px #fb7185;
            overflow: hidden;
        }

        #visualCanvas {
            width: 100%;
            height: 380px;
            background: #e0f2fe; /* 天蓝色背景 */
            border-bottom: 4px solid #000;
            position: relative;
            overflow: hidden;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: white;
            border: 3px solid #000;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
            position: relative;
            box-shadow: 4px 4px 0px #000;
        }

        .option-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #f43f5e;
            background: #fff1f2;
        }

        .option-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000;
        }

        .selected {
            background: #f43f5e !important;
            color: white !important;
        }

        .hidden { display: none !important; }

        /* 漫画对话框样式 */
        .speech-bubble {
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
        }

        #stepLabel {
            font-family: 'ZCOOL KuaiLe', sans-serif;
        }
    </style>
</head>
<body>

    <div id="loginLayer" class="comic-container p-12 text-center">
        <h1 class="text-5xl font-black mb-6" style="color:#f43f5e">幼教心理剧场</h1>
        <p class="text-xl mb-10 font-bold">—— 测测你的专业关注阶段 ——</p>
        <div class="mb-10">
            <svg width="150" height="150" viewBox="0 0 100 100" class="mx-auto">
                <!-- 南方公园风的小老师 -->
                <circle cx="50" cy="40" r="30" fill="#ffdbac" stroke="#000" stroke-width="2"/>
                <circle cx="40" cy="35" r="5" fill="#000"/>
                <circle cx="60" cy="35" r="5" fill="#000"/>
                <path d="M40 55 Q50 65 60 55" fill="none" stroke="#000" stroke-width="2"/>
                <rect x="30" y="70" width="40" height="30" rx="10" fill="#f43f5e" stroke="#000" stroke-width="2"/>
            </svg>
        </div>
        <input type="text" id="stuName" placeholder="你的英雄之名" class="w-full p-4 border-4 border-black rounded-xl mb-8 text-center text-2xl outline-none focus:ring-4 ring-rose-300">
        <button onclick="initApp()" class="w-full bg-black text-white py-5 rounded-xl font-black text-2xl hover:bg-rose-600 transition-colors">开启冒险</button>
    </div>

    <div id="gameLayer" class="comic-container hidden">
        <div class="p-4 bg-yellow-300 border-bottom border-4 border-black flex justify-between items-center">
            <span id="stepLabel" class="text-2xl font-black">SCENE: 1/4</span>
            <span id="themeTag" class="bg-white border-2 border-black px-4 py-1 rounded-full font-bold">生存关注</span>
            <span id="userNameTag" class="font-bold italic"></span>
        </div>

        <div id="visualCanvas">
            <!-- SVG内容由JS填充 -->
        </div>

        <div class="p-8">
            <h2 id="qText" class="text-2xl font-black mb-8 leading-tight">加载中...</h2>
            <div id="options"></div>
            
            <div id="reflectionArea" class="hidden mt-6 p-6 bg-rose-50 border-4 border-black rounded-2xl">
                <p class="font-black text-rose-600 mb-4 italic">思维闪电：此时你更关注“自我保护”还是“生命状态”？</p>
                <textarea id="reflectionInput" class="w-full p-4 border-3 border-black rounded-xl mb-4 font-bold" rows="2" placeholder="写下你的真实觉察..."></textarea>
                <button onclick="nextStep()" class="w-full bg-black text-white py-4 rounded-xl font-black text-xl">下一幕</button>
            </div>
        </div>
    </div>

    <div id="resultLayer" class="comic-container hidden p-16 text-center">
        <h2 class="text-5xl font-black mb-10">专业心理画像</h2>
        <div id="resultText" class="text-2xl font-bold p-8 border-4 border-black bg-yellow-100 rounded-3xl mb-10 leading-relaxed shadow-[8px_8px_0px_#000]"></div>
        <button onclick="location.reload()" class="bg-black text-white px-12 py-4 rounded-xl font-black text-xl">重塑自我</button>
    </div>

    <script>
        let currentIdx = 0;
        let score = 0;
        let username = "";

        // 动画定义逻辑：南方公园风格
        const SCENES = {
            1: (state) => `
                <svg width="100%" height="100%" viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
                    <rect width="800" height="380" fill="#e0f2fe"/>
                    <rect y="280" width="800" height="100" fill="#4ade80"/> <!-- 草地 -->
                    
                    <!-- 老师 -->
                    <g transform="translate(100, 200)">
                        <animateTransform attributeName="transform" type="translate" values="100,200; 100,195; 100,200" dur="0.6s" repeatCount="indefinite" />
                        <circle cx="0" cy="0" r="40" fill="#ffdbac" stroke="#000" stroke-width="3"/>
                        <circle cx="-15" cy="-5" r="6" fill="#000"/> <circle cx="15" cy="-5" r="6" fill="#000"/>
                        <path d="M-10 15 Q0 ${state==='bad' ? '5' : '25'} 10 15" fill="none" stroke="#000" stroke-width="3"/>
                        <rect x="-30" y="40" width="60" height="50" rx="15" fill="#f43f5e" stroke="#000" stroke-width="3"/>
                        ${state==='bad' ? '<text x="0" y="-60" font-size="40">😰</text>' : ''}
                    </g>

                    <!-- 两个孩子争抢 -->
                    <g transform="translate(450, 220)">
                        <g>
                            <animateTransform attributeName="transform" type="translate" values="0,0; 5,0; 0,0" dur="0.1s" repeatCount="indefinite" />
                            <circle cx="0" cy="0" r="30" fill="#ffcc99" stroke="#000" stroke-width="3"/>
                            <rect x="-20" y="30" width="40" height="40" rx="10" fill="#60a5fa" stroke="#000" stroke-width="3"/>
                            <text x="0" y="-40" font-size="20" font-weight="bold">#@!%!</text>
                        </g>
                        <g transform="translate(80, 0)">
                            <animateTransform attributeName="transform" type="translate" values="0,0; -5,0; 0,0" dur="0.1s" repeatCount="indefinite" />
                            <circle cx="0" cy="0" r="30" fill="#ffcc99" stroke="#000" stroke-width="3"/>
                            <rect x="-20" y="30" width="40" height="40" rx="10" fill="#fb7185" stroke="#000" stroke-width="3"/>
                        </g>
                        <rect x="30" y="40" width="20" height="20" fill="#fbbf24" stroke="#000" stroke-width="2">
                             <animate attributeName="x" values="20;40;20" dur="0.2s" repeatCount="indefinite" />
                        </rect>
                    </g>

                    <!-- 漫画气泡 -->
                    <g transform="translate(600, 80)">
                        <path d="M0 0 Q-20 0 -20 -20 L-20 -60 Q-20 -80 0 -80 L150 -80 Q170 -80 170 -60 L170 -20 Q170 0 150 0 L20 0 L0 20 Z" fill="white" stroke="black" stroke-width="3"/>
                        <text x="75" y="-40" text-anchor="middle" font-weight="bold">家长正在路过...</text>
                    </g>
                </svg>`,
            2: (state) => `
                <svg width="100%" height="100%" viewBox="0 0 800 380">
                    <rect width="800" height="380" fill="#1e293b"/>
                    <rect x="200" y="50" width="400" height="220" fill="#000" stroke="#fff" stroke-width="4" rx="10"/>
                    <text x="400" y="160" text-anchor="middle" fill="#ef4444" font-size="30" font-weight="black">ERROR: NO SIGNAL</text>
                    
                    <g transform="translate(400, 320)">
                         <animateTransform attributeName="transform" type="translate" values="400,320; 400,315; 400,320" dur="0.4s" repeatCount="indefinite" />
                         <circle r="35" fill="#ffdbac" stroke="#fff" stroke-width="2"/>
                         <text y="-50" x="50" fill="white" font-weight="bold">怎么办！后面还有专家听课...</text>
                    </g>
                </svg>`,
            3: (state) => `
                <svg width="100%" height="100%" viewBox="0 0 800 380">
                    <rect width="800" height="380" fill="#fdf4ff"/>
                    <!-- 老师 -->
                    <g transform="translate(150, 200)">
                        <circle r="40" fill="#ffdbac" stroke="#000" stroke-width="3"/>
                        <rect x="-30" y="40" width="60" height="50" rx="15" fill="#f43f5e" stroke="#000" stroke-width="3"/>
                    </g>
                    <!-- 举手的小朋友 -->
                    <g transform="translate(500, 250)">
                        <circle r="30" fill="#ffdbac" stroke="#000" stroke-width="3"/>
                        <rect x="-20" y="30" width="40" height="40" rx="10" fill="#c084fc" stroke="#000" stroke-width="3"/>
                        <g>
                            <animateTransform attributeName="transform" type="rotate" values="-10 0 30; 20 0 30; -10 0 30" dur="2s" repeatCount="indefinite" />
                            <rect x="-5" y="-20" width="10" height="50" rx="5" fill="#ffdbac" stroke="#000" stroke-width="2" />
                        </g>
                        ${state==='good' ? '<text x="0" y="-50" font-size="40">✨</text>' : ''}
                    </g>
                </svg>`,
            4: (state) => `
                <svg width="100%" height="100%" viewBox="0 0 800 380">
                    <rect width="800" height="380" fill="#fff"/>
                    <g transform="translate(400, 190)">
                        <circle r="20" fill="#f43f5e">
                            <animate attributeName="r" values="20;150" dur="3s" repeatCount="indefinite" />
                            <animate attributeName="opacity" values="0.5;0" dur="3s" repeatCount="indefinite" />
                        </circle>
                        <text text-anchor="middle" font-size="30" font-weight="black" fill="#000">全 息 觉 察</text>
                    </g>
                </svg>`
        };

        const QUESTIONS = [
            {
                title: "生存关注",
                q: "实境：两名幼儿在争抢积木并大声尖叫，此时门口正好有家长走过。你大脑的第一反应是？",
                ops: ["‘坏了！家长肯定觉得我没能力，我得赶快让他们闭嘴！’ (1分)", "‘按照常规，现在必须制止并收走积木。’ (2分)", "‘这种冲突正是他们练习社交的契机，我先观察一下。’ (3分)"]
            },
            {
                title: "任务关注",
                q: "实境：公开研讨课上，多媒体设备突然黑屏。你当时的心理感受更接近？",
                ops: ["感到极度挫败，心想‘精心准备的环节全完了’。 (1分)", "一边修理一边脑补教案，思考如何强行把进度拉回正轨。 (2分)", "关掉电源，顺势邀请幼儿一起在‘黑暗’中进行即兴想象。 (3分)"]
            },
            {
                title: "学生关注",
                q: "实境：一个极其内向、从不发言的孩子，今天在故事会快结束时微微举了下手。你会？",
                ops: ["对他点点头，记录下这一表现，然后按时宣布下课。 (1分)", "思考该幼儿的转变动因，准备作为个案分析的素材。 (2分)", "无视下课铃声，蹲下来用鼓励的眼神等待他完整的表达。 (3分)"]
            },
            {
                title: "专家阶段",
                q: "实境：面对繁杂、重复的日常班务，你目前的内心动力主要源自？",
                ops: ["‘灭火’。感觉每天都在处理各种突发状况，身心俱疲。 (1分)", "‘纯熟’。闭着眼都能把活儿干完，但感觉缺少了点灵魂。 (2分)", "‘感知’。常规已成背景，我的心理能量全部用于捕捉生命的变化。 (3分)"]
            }
        ];

        function initApp() {
            username = document.getElementById('stuName').value;
            if(!username) return;
            document.getElementById('loginLayer').classList.add('hidden');
            document.getElementById('gameLayer').classList.remove('hidden');
            document.getElementById('userNameTag').innerText = "Hero: " + username;
            renderStep();
        }

        function renderStep() {
            const data = QUESTIONS[currentIdx];
            if(!data) { showFinal(); return; }

            document.getElementById('stepLabel').innerText = `SCENE: ${currentIdx + 1}/4`;
            document.getElementById('themeTag').innerText = data.title;
            document.getElementById('qText').innerText = data.q;
            
            // 初始场景
            document.getElementById('visualCanvas').innerHTML = SCENES[currentIdx + 1]('init');

            const optBox = document.getElementById('options');
            optBox.innerHTML = data.ops.map((o, i) => `
                <button onclick="selectOpt(${i + 1}, this)" class="option-btn">
                    ${String.fromCharCode(65 + i)}. ${o}
                </button>
            `).join('');

            document.getElementById('reflectionArea').classList.add('hidden');
        }

        function selectOpt(val, btn) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            score += val;

            // 视觉反馈
            const feedbackState = val === 1 ? 'bad' : (val === 3 ? 'good' : 'init');
            document.getElementById('visualCanvas').innerHTML = SCENES[currentIdx + 1](feedbackState);

            if(currentIdx === 2) {
                document.getElementById('reflectionArea').classList.remove('hidden');
            } else {
                setTimeout(() => {
                    currentIdx++;
                    renderStep();
                }, 1200);
            }
        }

        function nextStep() {
            currentIdx++;
            renderStep();
        }

        function showFinal() {
            document.getElementById('gameLayer').classList.add('hidden');
            document.getElementById('resultLayer').classList.remove('hidden');
            
            let level = "";
            let description = "";
            if(score <= 6) {
                level = "【 生存关注阶段 】";
                description = `${username}，你正处于专业起步期。你非常在意外部的评价（如家长、领导），容易因为琐事感到焦虑。这是必经之路，试着把目光从“别人怎么看我”移向“孩子需要什么”。`;
            } else if(score <= 10) {
                level = "【 任务关注阶段 】";
                description = `${username}，你已经是一个熟练的教育执行者了。你关注教学目标的达成，关注课堂的完整性。但请注意，不要让冰冷的教案遮住了生动的孩子。`;
            } else {
                level = "【 学生关注阶段 】";
                description = `恭喜你，${username}！你已经展现出了“教育艺术家”的潜质。你能够敏锐地捕捉幼儿的心理动向，并愿意为了生命瞬间的火花调整自己的步调。`;
            }

            document.getElementById('resultText').innerHTML = `<div class="text-rose-600 text-3xl mb-4">${level}</div>${description}`;
        }
    </script>
</body>
</html>
